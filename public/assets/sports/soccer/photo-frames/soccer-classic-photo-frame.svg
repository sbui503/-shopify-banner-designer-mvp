<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" data-photo-frame-variant="classic">
  <title>Soccer Classic Photo Frame</title>
  <defs>
    <clipPath id="player_photo_mask"><circle cx="380" cy="286" r="176"/></clipPath>
    <mask id="photo_window_keepout" maskUnits="userSpaceOnUse"><rect width="760" height="760" fill="#fff"/><circle cx="380" cy="286" r="174" fill="#000"/></mask>
    <linearGradient id="nameplate_gradient" x1="0" x2="1"><stop offset="0" stop-color="#052e16"/><stop offset=".52" stop-color="#16a34a"/><stop offset="1" stop-color="#052e16"/></linearGradient>
    <filter id="frame_shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <g id="player_photo_frame" filter="url(#frame_shadow)">
    <g id="frame_decor" mask="url(#photo_window_keepout)"><ellipse id="frame_classic_glow" cx="380" cy="384" rx="294" ry="286" fill="#16a34a" opacity=".12"/></g>
    <circle id="player_photo_window" cx="380" cy="286" r="176" fill="none" clip-path="url(#player_photo_mask)"/>
    <circle id="player_frame_outer" cx="380" cy="286" r="220" fill="none" stroke="#fff" stroke-width="36"/>
    <circle id="player_frame_color" cx="380" cy="286" r="198" fill="none" stroke="#16a34a" stroke-width="16"/>
    <circle id="player_frame_inner" cx="380" cy="286" r="178" fill="none" stroke="#052e16" stroke-width="8"/>
    <g id="sport_icon"><circle cx="380" cy="600" r="58" fill="#fff" stroke="#052e16" stroke-width="4.64"/><polygon points="380,575.64 402.04,591.88 393.92,618.56 366.08,618.56 357.96,591.88" fill="#052e16"/><path d="M380 575.64 L380 547.8 M402.04 591.88 L429.88 583.76 M393.92 618.56 L411.32 642.92 M366.08 618.56 L348.68 642.92 M357.96 591.88 L330.12 583.76" stroke="#052e16" stroke-width="4.0600000000000005"/></g>
    <path id="player_nameplate" d="M146 442 C238 404 522 404 614 442 L642 588 C530 632 230 632 118 588 Z" fill="url(#nameplate_gradient)" stroke="#fff" stroke-width="14"/><path id="player_nameplate_accent" d="M178 480 C278 454 482 454 582 480" fill="none" stroke="#bbf7d0" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>