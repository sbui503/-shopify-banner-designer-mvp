<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" data-photo-frame-variant="classic">
  <title>Track &amp; Field Classic Photo Frame</title>
  <defs>
    <clipPath id="player_photo_mask"><circle cx="380" cy="286" r="176"/></clipPath>
    <mask id="photo_window_keepout" maskUnits="userSpaceOnUse"><rect width="760" height="760" fill="#fff"/><circle cx="380" cy="286" r="174" fill="#000"/></mask>
    <linearGradient id="nameplate_gradient" x1="0" x2="1"><stop offset="0" stop-color="#0f172a"/><stop offset=".52" stop-color="#f59e0b"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="frame_shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <g id="player_photo_frame" filter="url(#frame_shadow)">
    <g id="frame_decor" mask="url(#photo_window_keepout)"><ellipse id="frame_classic_glow" cx="380" cy="384" rx="294" ry="286" fill="#f59e0b" opacity=".12"/></g>
    <circle id="player_photo_window" cx="380" cy="286" r="176" fill="none" clip-path="url(#player_photo_mask)"/>
    <circle id="player_frame_outer" cx="380" cy="286" r="220" fill="none" stroke="#fff" stroke-width="36"/>
    <circle id="player_frame_color" cx="380" cy="286" r="198" fill="none" stroke="#f59e0b" stroke-width="16"/>
    <circle id="player_frame_inner" cx="380" cy="286" r="178" fill="none" stroke="#0f172a" stroke-width="8"/>
    <g id="sport_icon"><circle cx="380" cy="600" r="58" fill="#f59e0b" stroke="#fff" stroke-width="4.64"/><path d="M341.72 611.6 C373.04 575.64 404.36 583.76 419.44 612.76" fill="none" stroke="#0f172a" stroke-width="5.800000000000001" stroke-linecap="round"/><path d="M354.48 627.84 L407.84 627.84" stroke="#fff" stroke-width="5.22" stroke-linecap="round"/><path d="M369.56 566.36 L389.28 566.36" stroke="#fff" stroke-width="5.22" stroke-linecap="round"/></g>
    <path id="player_nameplate" d="M146 442 C238 404 522 404 614 442 L642 588 C530 632 230 632 118 588 Z" fill="url(#nameplate_gradient)" stroke="#fff" stroke-width="14"/><path id="player_nameplate_accent" d="M178 480 C278 454 482 454 582 480" fill="none" stroke="#fde68a" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>