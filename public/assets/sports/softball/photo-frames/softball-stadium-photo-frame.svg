<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" data-photo-frame-variant="stadium">
  <title>Softball Stadium Photo Frame</title>
  <defs>
    <clipPath id="player_photo_mask"><circle cx="380" cy="286" r="176"/></clipPath>
    <mask id="photo_window_keepout" maskUnits="userSpaceOnUse"><rect width="760" height="760" fill="#fff"/><circle cx="380" cy="286" r="174" fill="#000"/></mask>
    <linearGradient id="nameplate_gradient" x1="0" x2="1"><stop offset="0" stop-color="#111827"/><stop offset=".52" stop-color="#facc15"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <filter id="frame_shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <g id="player_photo_frame" filter="url(#frame_shadow)">
    <g id="frame_decor" mask="url(#photo_window_keepout)"><g id="frame_stadium_lights"><circle id="frame_stadium_light_1" cx="160" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_2" cx="204" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_3" cx="248" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_4" cx="292" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_5" cx="336" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_6" cx="380" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_7" cx="424" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_8" cx="468" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_9" cx="512" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_10" cx="556" cy="86" r="14" fill="#fff" opacity=".72"/><circle id="frame_stadium_light_11" cx="600" cy="86" r="14" fill="#fff" opacity=".72"/><path d="M110 90 L282 398" stroke="#fff" stroke-opacity=".25" stroke-width="34"/><path d="M650 90 L478 398" stroke="#fff" stroke-opacity=".25" stroke-width="34"/><path d="M380 58 V410" stroke="#fef3c7" stroke-opacity=".18" stroke-width="48"/></g></g>
    <circle id="player_photo_window" cx="380" cy="286" r="176" fill="none" clip-path="url(#player_photo_mask)"/>
    <circle id="player_frame_outer" cx="380" cy="286" r="220" fill="none" stroke="#fff" stroke-width="36"/>
    <circle id="player_frame_color" cx="380" cy="286" r="198" fill="none" stroke="#facc15" stroke-width="16"/>
    <circle id="player_frame_inner" cx="380" cy="286" r="178" fill="none" stroke="#111827" stroke-width="8"/>
    <g id="sport_icon"><circle cx="380" cy="600" r="58" fill="#fef08a" stroke="#111827" stroke-width="3.48"/><path d="M349.84 552.44 C370.72 583.76 370.72 616.24 349.84 647.56" fill="none" stroke="#facc15" stroke-width="4.0600000000000005"/><path d="M410.16 552.44 C389.28 583.76 389.28 616.24 410.16 647.56" fill="none" stroke="#facc15" stroke-width="4.0600000000000005"/></g>
    <path id="player_nameplate" d="M146 442 C238 404 522 404 614 442 L642 588 C530 632 230 632 118 588 Z" fill="url(#nameplate_gradient)" stroke="#fff" stroke-width="14"/><path id="player_nameplate_accent" d="M178 480 C278 454 482 454 582 480" fill="none" stroke="#fef3c7" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>