<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" data-photo-frame-variant="shield">
  <title>Basketball Shield Photo Frame</title>
  <defs>
    <clipPath id="player_photo_mask"><circle cx="380" cy="286" r="176"/></clipPath>
    <mask id="photo_window_keepout" maskUnits="userSpaceOnUse"><rect width="760" height="760" fill="#fff"/><circle cx="380" cy="286" r="174" fill="#000"/></mask>
    <linearGradient id="nameplate_gradient" x1="0" x2="1"><stop offset="0" stop-color="#111827"/><stop offset=".52" stop-color="#f97316"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <filter id="frame_shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <g id="player_photo_frame" filter="url(#frame_shadow)">
    <g id="frame_decor" mask="url(#photo_window_keepout)"><path id="frame_shield_back" d="M380 392 L604 468 L552 668 L380 742 L208 668 L156 468 Z" fill="#111827" stroke="#fff" stroke-width="14"/><path id="frame_shield_accent" d="M224 512 H536" stroke="#f97316" stroke-width="18" stroke-linecap="round"/></g>
    <circle id="player_photo_window" cx="380" cy="286" r="176" fill="none" clip-path="url(#player_photo_mask)"/>
    <circle id="player_frame_outer" cx="380" cy="286" r="220" fill="none" stroke="#fff" stroke-width="36"/>
    <circle id="player_frame_color" cx="380" cy="286" r="198" fill="none" stroke="#f97316" stroke-width="16"/>
    <circle id="player_frame_inner" cx="380" cy="286" r="178" fill="none" stroke="#111827" stroke-width="8"/>
    <g id="sport_icon"><circle cx="380" cy="600" r="58" fill="#fff" stroke="#111827" stroke-width="3.48"/><path d="M349.84 552.44 C370.72 583.76 370.72 616.24 349.84 647.56" fill="none" stroke="#f97316" stroke-width="4.0600000000000005"/><path d="M410.16 552.44 C389.28 583.76 389.28 616.24 410.16 647.56" fill="none" stroke="#f97316" stroke-width="4.0600000000000005"/></g>
    <path id="player_nameplate" d="M160 494 H600 L560 632 H200 Z" fill="url(#nameplate_gradient)" stroke="#fff" stroke-width="14"/><path id="player_nameplate_accent" d="M210 530 H550" stroke="#fed7aa" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>