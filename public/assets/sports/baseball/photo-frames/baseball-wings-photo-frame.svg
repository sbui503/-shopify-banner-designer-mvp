<svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" data-photo-frame-variant="wings">
  <title>Baseball Wings Photo Frame</title>
  <defs>
    <clipPath id="player_photo_mask"><circle cx="380" cy="286" r="176"/></clipPath>
    <mask id="photo_window_keepout" maskUnits="userSpaceOnUse"><rect width="760" height="760" fill="#fff"/><circle cx="380" cy="286" r="174" fill="#000"/></mask>
    <linearGradient id="nameplate_gradient" x1="0" x2="1"><stop offset="0" stop-color="#0b2f63"/><stop offset=".52" stop-color="#d71920"/><stop offset="1" stop-color="#0b2f63"/></linearGradient>
    <filter id="frame_shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <g id="player_photo_frame" filter="url(#frame_shadow)">
    <g id="frame_decor" mask="url(#photo_window_keepout)"><path id="frame_wing_left_1" d="M338 390 C210 388 118 330 56 232 C148 264 220 268 304 244" fill="#fff" opacity=".94" stroke="#0b2f63" stroke-width="8"/><path id="frame_wing_left_2" d="M316 432 C200 444 110 408 36 326 C130 340 204 334 286 300" fill="#f8fafc" opacity=".9" stroke="#0b2f63" stroke-width="7"/><path id="frame_wing_right_1" d="M422 390 C550 388 642 330 704 232 C612 264 540 268 456 244" fill="#fff" opacity=".94" stroke="#0b2f63" stroke-width="8"/><path id="frame_wing_right_2" d="M444 432 C560 444 650 408 724 326 C630 340 556 334 474 300" fill="#f8fafc" opacity=".9" stroke="#0b2f63" stroke-width="7"/></g>
    <circle id="player_photo_window" cx="380" cy="286" r="176" fill="none" clip-path="url(#player_photo_mask)"/>
    <circle id="player_frame_outer" cx="380" cy="286" r="220" fill="none" stroke="#fff" stroke-width="36"/>
    <circle id="player_frame_color" cx="380" cy="286" r="198" fill="none" stroke="#d71920" stroke-width="16"/>
    <circle id="player_frame_inner" cx="380" cy="286" r="178" fill="none" stroke="#0b2f63" stroke-width="8"/>
    <g id="sport_icon"><circle cx="380" cy="600" r="58" fill="#fff" stroke="#0b2f63" stroke-width="3.48"/><path d="M349.84 552.44 C370.72 583.76 370.72 616.24 349.84 647.56" fill="none" stroke="#d71920" stroke-width="4.0600000000000005"/><path d="M410.16 552.44 C389.28 583.76 389.28 616.24 410.16 647.56" fill="none" stroke="#d71920" stroke-width="4.0600000000000005"/></g>
    <path id="player_nameplate" d="M146 442 C238 404 522 404 614 442 L642 588 C530 632 230 632 118 588 Z" fill="url(#nameplate_gradient)" stroke="#fff" stroke-width="14"/><path id="player_nameplate_accent" d="M178 480 C278 454 482 454 582 480" fill="none" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>